services:
  postgres:
    image: postgres:16-alpine
    container_name: ethara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ethara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethara_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ethara_seat_allocation}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ethara} -d ${POSTGRES_DB:-ethara_seat_allocation}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ethara-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ethara}:${POSTGRES_PASSWORD:-ethara_dev_password}@postgres:5432/${POSTGRES_DB:-ethara_seat_allocation}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8000
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: ethara-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
